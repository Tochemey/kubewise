version: 2

project_name: kubectl-whatif

builds:
  - id: kubectl-whatif
    main: ./cmd/kubectl-whatif/
    binary: kubectl-whatif
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.buildDate={{.Date}}

universal_binaries:
  - id: kubectl-whatif-universal
    ids:
      - kubectl-whatif
    replace: false
    name_template: kubectl-whatif

archives:
  - id: kubectl-whatif
    ids:
      - kubectl-whatif
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
  - id: kubectl-whatif-universal
    ids:
      - kubectl-whatif-universal
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_darwin_universal"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

release:
  github:
    owner: tochemey
    name: kubewise
  draft: false
  prerelease: auto

homebrew_casks:
  - name: kubectl-whatif
    ids:
      - kubectl-whatif
    repository:
      owner: tochemey
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/tochemey/kubewise"
    description: "Kubernetes cost and performance what-if simulator"

scoops:
  - name: kubectl-whatif
    ids:
      - kubectl-whatif
    repository:
      owner: tochemey
      name: scoop-bucket
      token: "{{ .Env.SCOOP_BUCKET_GITHUB_TOKEN }}"
    homepage: "https://github.com/tochemey/kubewise"
    description: "Kubernetes cost and performance what-if simulator"
    license: "Apache-2.0"

krews:
  - name: whatif
    ids:
      - kubectl-whatif
    repository:
      owner: tochemey
      name: krew-index
    homepage: "https://github.com/tochemey/kubewise"
    short_description: "Kubernetes cost and performance what-if simulator"
    description: |
      KubeWise is a Kubernetes cost × performance "what-if" simulator.
      It snapshots a live cluster's state, applies hypothetical changes,
      simulates the outcome, and reports cost savings alongside reliability risk.
